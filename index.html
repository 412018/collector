<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏庫</title>
    <!-- 引入 Tailwind CSS 以進行快速且美觀的樣式設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義過渡效果 */
        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
            transition: all 0.3s ease-out;
        }
        .toast-leave {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-leave-active {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s ease-in;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <!-- 頂部導航列 -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path></svg>
                <h1 class="text-2xl font-bold text-gray-900">我的收藏庫</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-sm text-gray-500 hidden sm:block">
                    共 <span id="total-count" class="font-bold text-indigo-600">0</span> 個收藏
                </div>
                <div id="auth-container">
                    <button id="login-btn-header" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">登入</button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col lg:flex-row gap-8 hidden">
        
        <!-- 左側：新增表單 -->
        <aside class="w-full lg:w-1/3">
            <div class="bg-white rounded-xl shadow-md p-6 sticky top-24">
                <h2 class="text-xl font-semibold mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    新增收藏
                </h2>
                
                <form id="add-form" class="space-y-4">
                    <div>
                        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">標題 *</label>
                        <input type="text" id="title" required placeholder="例如：Google" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                    </div>
                    
                    <div>
                        <label for="url" class="block text-sm font-medium text-gray-700 mb-1">網址 *</label>
                        <input type="url" id="url" required placeholder="https://example.com" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors">
                    </div>
                    
                    <div>
                        <label for="category" class="block text-sm font-medium text-gray-700 mb-1">分類</label>
                        <select id="category" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors bg-white">
                            <option value="學習">學習</option>
                            <option value="工具">工具</option>
                            <option value="靈感">靈感</option>
                            <option value="娛樂">娛樂</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>

                    <div>
                        <label for="description" class="block text-sm font-medium text-gray-700 mb-1">描述 (選填)</label>
                        <textarea id="description" rows="3" placeholder="寫點備註..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-colors resize-none"></textarea>
                    </div>
                    
                    <div>
                        <label for="image-upload" class="block text-sm font-medium text-gray-700 mb-1">上傳圖片 (選填)</label>
                        <input type="file" id="image-upload" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 transition-colors cursor-pointer">
                        <div id="image-preview-container" class="mt-2 hidden relative">
                            <img id="image-preview" src="" alt="預覽" class="w-full h-32 object-cover rounded-lg border border-gray-200">
                            <button type="button" id="remove-image-btn" class="absolute top-1 right-1 bg-white bg-opacity-80 rounded-full p-1 text-gray-600 hover:text-red-500 shadow-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors shadow-sm flex justify-center items-center gap-2">
                        <span>儲存收藏</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- 右側：收藏列表 -->
        <section class="w-full lg:w-2/3">
            <!-- 篩選列 -->
            <div class="mb-6 flex flex-wrap gap-2" id="filter-container">
                <button data-filter="all" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-indigo-100 text-indigo-700 transition-colors">全部</button>
                <button data-filter="學習" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">學習</button>
                <button data-filter="工具" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">工具</button>
                <button data-filter="靈感" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">靈感</button>
                <button data-filter="娛樂" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">娛樂</button>
                <button data-filter="其他" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">其他</button>
            </div>

            <!-- 收藏卡片網格 -->
            <div id="collections-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 卡片將由 JavaScript 動態生成在這裡 -->
            </div>
            
            <!-- 空狀態顯示 -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center">
                <svg class="w-16 h-16 text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <h3 class="text-lg font-medium text-gray-900">目前沒有收藏</h3>
                <p class="text-gray-500 mt-1">在左側表單新增你的第一個收藏吧！</p>
            </div>
        </section>

    </main>

    <!-- 登入提示畫面 -->
    <div id="login-prompt" class="max-w-md mx-auto mt-24 text-center px-4">
        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <svg class="w-16 h-16 text-indigo-600 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">歡迎來到我的收藏庫</h2>
            <p class="text-gray-500 mb-6">登入 Google 帳號以安全地將您的收藏儲存於雲端。</p>
            <button id="hero-login-btn" class="w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-bold py-3 px-4 rounded-xl transition-all shadow-sm flex items-center justify-center gap-3">
                <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
                使用 Google 登入
            </button>
        </div>
    </div>

    <!-- 浮動通知容器 -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmwuHmx4FXBogY5Z0dYa9tLfZmivYjQmI",
            authDomain: "collector-41cc2.firebaseapp.com",
            projectId: "collector-41cc2",
            storageBucket: "collector-41cc2.firebasestorage.app",
            messagingSenderId: "807459309253",
            appId: "1:807459309253:web:aa7a9232fe2703b86252ac"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let collections = [];
        let currentFilter = 'all';
        let unsubscribeSnapshot = null;
        let base64ImageString = null;

        // DOM 元素
        const mainContent = document.getElementById('main-content');
        const loginPrompt = document.getElementById('login-prompt');
        const authContainer = document.getElementById('auth-container');
        const loginBtnHeader = document.getElementById('login-btn-header');
        const heroLoginBtn = document.getElementById('hero-login-btn');
        
        const form = document.getElementById('add-form');
        const submitBtn = document.getElementById('submit-btn');
        const grid = document.getElementById('collections-grid');
        const emptyState = document.getElementById('empty-state');
        const totalCount = document.getElementById('total-count');
        const filterBtns = document.querySelectorAll('.filter-btn');
        
        const imageUpload = document.getElementById('image-upload');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        // 圖片轉 Base64 與壓縮
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height && width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    } else if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // 轉換為 base64 (jpeg格式, 品質0.7)
                    base64ImageString = canvas.toDataURL('image/jpeg', 0.7);
                    imagePreview.src = base64ImageString;
                    imagePreviewContainer.classList.remove('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        removeImageBtn.addEventListener('click', () => {
            imageUpload.value = '';
            base64ImageString = null;
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = '';
        });

        // Auth 狀態監聽
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loginPrompt.classList.add('hidden');
                mainContent.classList.remove('hidden');
                
                authContainer.innerHTML = `
                    <div class="flex items-center gap-3">
                        <img src="${user.photoURL || 'https://via.placeholder.com/40'}" alt="User" class="w-8 h-8 rounded-full border border-gray-200">
                        <button id="logout-btn" class="text-sm text-gray-500 hover:text-gray-700 font-medium transition-colors">登出</button>
                    </div>
                `;
                document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
                
                showToast(`歡迎回來，${user.displayName}!`, 'success');
                loadCollections(user.uid);
            } else {
                currentUser = null;
                collections = [];
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                
                loginPrompt.classList.remove('hidden');
                mainContent.classList.add('hidden');
                
                authContainer.innerHTML = `<button id="login-btn-header" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">登入</button>`;
                document.getElementById('login-btn-header').addEventListener('click', signIn);
            }
        });

        const signIn = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(err => showToast('登入失敗: ' + err.message, 'error'));
        };

        if(loginBtnHeader) loginBtnHeader.addEventListener('click', signIn);
        if(heroLoginBtn) heroLoginBtn.addEventListener('click', signIn);

        // 讀取 Firestore 資料
        function loadCollections(userId) {
            const q = query(
                collection(db, "users", userId, "collections"),
                orderBy("createdAt", "desc")
            );

            unsubscribeSnapshot = onSnapshot(q, (snapshot) => {
                collections = [];
                snapshot.forEach((doc) => {
                    collections.push({ id: doc.id, ...doc.data() });
                });
                renderCollections();
            }, (error) => {
                console.error(error);
                showToast('讀取失敗，請確認 Firestore 規則', 'error');
            });
        }

        // 新增資料到 Firestore
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!currentUser) return;

            submitBtn.disabled = true;
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = `<span>儲存中...</span>`;

            let url = document.getElementById('url').value.trim();
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            try {
                await addDoc(collection(db, "users", currentUser.uid, "collections"), {
                    title: document.getElementById('title').value.trim(),
                    url: url,
                    category: document.getElementById('category').value,
                    description: document.getElementById('description').value.trim(),
                    image: base64ImageString,
                    date: new Date().toLocaleDateString(),
                    createdAt: serverTimestamp()
                });

                form.reset();
                removeImageBtn.click();
                showToast('已成功新增收藏！', 'success');
            } catch (error) {
                console.error(error);
                showToast('新增失敗: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });

        // 刪除 Firestore 資料 (為了避免原生 confirm 中斷流程，這裡直接刪除並給提示)
        window.deleteCollection = async function(id) {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, "users", currentUser.uid, "collections", id));
                showToast('已刪除收藏', 'info');
            } catch (error) {
                showToast('刪除失敗', 'error');
            }
        }

        // 篩選功能
        filterBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentFilter = e.target.dataset.filter;
                filterBtns.forEach(b => {
                    if (b.dataset.filter === currentFilter) {
                        b.classList.remove('bg-white', 'border', 'border-gray-200', 'text-gray-600');
                        b.classList.add('bg-indigo-100', 'text-indigo-700');
                    } else {
                        b.classList.remove('bg-indigo-100', 'text-indigo-700');
                        b.classList.add('bg-white', 'border', 'border-gray-200', 'text-gray-600');
                    }
                });
                renderCollections();
            });
        });

        // 渲染畫面
        function renderCollections() {
            grid.innerHTML = '';
            const filteredData = currentFilter === 'all' 
                ? collections 
                : collections.filter(item => item.category === currentFilter);

            totalCount.textContent = collections.length;

            if (filteredData.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            grid.classList.remove('hidden');
            emptyState.classList.add('hidden');

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-xl shadow-sm border border-gray-100 p-5 transition-all duration-300 card-hover flex flex-col h-full';
                const categoryColor = getCategoryColor(item.category);
                
                const imageHtml = item.image 
                    ? `<div class="mb-3 w-full h-36 rounded-lg overflow-hidden bg-gray-50 flex-shrink-0">
                           <img src="${item.image}" alt="封面圖" class="w-full h-full object-cover border border-gray-100 rounded-lg">
                       </div>` 
                    : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="px-2.5 py-1 rounded-md text-xs font-medium ${categoryColor}">
                            ${item.category}
                        </span>
                        <button onclick="deleteCollection('${item.id}')" class="text-gray-400 hover:text-red-500 transition-colors p-1" title="刪除">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                    ${imageHtml}
                    <h3 class="text-lg font-bold text-gray-900 mb-1 line-clamp-2">
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="hover:text-indigo-600 transition-colors">
                            ${item.title}
                        </a>
                    </h3>
                    <p class="text-sm text-gray-500 mb-4 flex-grow line-clamp-3">${item.description || '無描述'}</p>
                    
                    <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center">
                        <span class="text-xs text-gray-400">${item.date}</span>
                        <a href="${item.url}" target="_blank" rel="noopener noreferrer" class="text-sm font-medium text-indigo-600 hover:text-indigo-800 flex items-center gap-1">
                            前往連結
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function getCategoryColor(category) {
            const colors = {
                '學習': 'bg-blue-100 text-blue-700',
                '工具': 'bg-emerald-100 text-emerald-700',
                '靈感': 'bg-amber-100 text-amber-700',
                '娛樂': 'bg-purple-100 text-purple-700',
                '其他': 'bg-gray-100 text-gray-700'
            };
            return colors[category] || colors['其他'];
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const baseClass = "px-4 py-3 rounded-lg shadow-lg text-sm font-medium flex items-center gap-2 transform transition-all duration-300";
            const typeClass = type === 'success' ? "bg-green-600 text-white" : type === 'error' ? "bg-red-600 text-white" : "bg-gray-800 text-white";
                
            const icon = type === 'success' || type === 'info'
                ? `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;

            toast.className = `${baseClass} ${typeClass} toast-enter`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-enter-active');
            });

            setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-leave-active');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
